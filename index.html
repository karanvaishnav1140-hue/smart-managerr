<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CGN Smart</title>

<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
overflow-x:hidden;
}

.container{
display:flex;
width:500%;
transition:0.5s;
}

.page{
width:100vw;
padding:20px;
}

.card{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
border-radius:20px;
padding:20px;
margin-bottom:20px;
box-shadow:0 0 20px rgba(0,255,255,0.2);
}

input{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:10px;
}

button{
padding:10px;
border:none;
border-radius:10px;
background:#00ffcc;
color:black;
font-weight:bold;
width:100%;
}

.bottom-nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#111;
}

.bottom-nav button{
flex:1;
background:none;
color:white;
font-size:16px;
}
</style>
</head>

<body>

<div class="container" id="slider">

<!-- DASHBOARD -->
<div class="page">
<h2>Dashboard</h2>
<div class="card">
<p>Net Profit Today:</p>
<h1 id="profit">₹0</h1>
</div>
</div>

<!-- EARNINGS -->
<div class="page">
<h2>Earnings</h2>
<div class="card">
<input type="number" id="km" placeholder="Daily KM">
<input type="number" id="income" placeholder="Income">
<input type="number" id="fuelCost" placeholder="Fuel Cost">
<input type="number" id="maintCost" placeholder="Maintenance Cost">
<button onclick="calculate()">Calculate</button>
</div>
</div>

<!-- FUEL -->
<div class="page">
<h2>Fuel Analyzer</h2>
<div class="card">
<canvas id="fuelChart"></canvas>
</div>
</div>

<!-- MAINTENANCE -->
<div class="page">
<h2>Maintenance</h2>
<div class="card">
<input type="number" id="lastService" placeholder="Last Service KM">
<input type="number" id="currentKM" placeholder="Current KM">
<input type="number" id="interval" placeholder="Service Interval">
<button onclick="serviceCheck()">Check</button>
<p id="serviceStatus"></p>
</div>
</div>

<!-- GROWTH -->
<div class="page">
<h2>Growth</h2>
<div class="card">
<p>Lifetime Profit: ₹<span id="lifetime">0</span></p>
</div>
</div>

</div>

<div class="bottom-nav">
<button onclick="slide(0)">🏠</button>
<button onclick="slide(1)">💰</button>
<button onclick="slide(2)">⛽</button>
<button onclick="slide(3)">🛠</button>
<button onclick="slide(4)">📊</button>
</div>

<script>
let slider=document.getElementById("slider");

function slide(index){
slider.style.transform="translateX(-"+(index*100)+"vw)";
}

function calculate(){
let km=document.getElementById("km").value;
let income=document.getElementById("income").value;
let fuel=document.getElementById("fuelCost").value;
let maint=document.getElementById("maintCost").value;

let profit=income - fuel - maint;

document.getElementById("profit").innerText="₹"+profit;
document.getElementById("lifetime").innerText=profit;
}

function serviceCheck(){
let last=parseInt(document.getElementById("lastService").value);
let current=parseInt(document.getElementById("currentKM").value);
let interval=parseInt(document.getElementById("interval").value);

let due=(last+interval)-current;

if(due>0){
document.getElementById("serviceStatus").innerText="Service due in "+due+" KM";
}else{
document.getElementById("serviceStatus").innerText="Service Overdue!";
}
}

new Chart(document.getElementById("fuelChart"),{
type:"line",
data:{
labels:["Tank1","Tank2","Tank3"],
datasets:[{
label:"Mileage",
data:[28,27,22],
borderColor:"#00ffcc",
fill:false
}]
}
});
</script>

</body>
</html>
