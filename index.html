<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CGN Smart</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{box-sizing:border-box;}
body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(160deg,#0c0f1a,#111827);
color:white;
overflow:hidden;
}

.screen{
display:none;
height:calc(100vh - 70px);
overflow-y:auto;
padding-bottom:20px;
}

.active{display:block;}

.card{
background:rgba(255,255,255,0.05);
margin:15px;
padding:20px;
border-radius:20px;
backdrop-filter:blur(15px);
box-shadow:0 0 25px rgba(0,255,170,0.1);
}

input{
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:12px;
background:#1a1f2e;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#00ffaa,#00ccff);
color:black;
font-weight:bold;
}

.big{
font-size:26px;
color:#00ffaa;
font-weight:bold;
}

.navbar{
position:fixed;
bottom:0;
width:100%;
height:70px;
background:#111827;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid rgba(255,255,255,0.1);
}

.navbar div{
color:#888;
font-size:14px;
text-align:center;
}

.navbar .activeTab{
color:#00ffaa;
}

h3{margin-top:0;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="card" style="margin-top:100px;">
<h2>CGN Smart</h2>
<input type="text" id="loginId" placeholder="User ID">
<input type="password" id="loginPin" placeholder="4 Digit PIN">
<button onclick="login()">Login / Register</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<!-- DASHBOARD -->
<div id="dashboard" class="screen active">
<div class="card">
<h3>Tank Intelligence</h3>
<div>Fuel Left</div>
<div class="big" id="fuelLeft">0 L</div>
<div>KM Can Run</div>
<div class="big" id="kmRun">0 KM</div>
<div>Current Tank KM</div>
<div class="big" id="tankKM">0 KM</div>
<div>Mileage</div>
<div class="big" id="mileageDisplay">0 KM/L</div>
<button onclick="resetTank()">Reset Tank</button>
</div>
</div>

<!-- FUEL -->
<div id="fuel" class="screen">
<div class="card">
<h3>Fuel Settings</h3>
<input type="number" id="tankCapacity" placeholder="Tank Capacity (Default 4)" value="4">
<input type="number" id="manualMileage" placeholder="Manual Mileage (optional)">
</div>

<div class="card">
<h3>Add Fuel Refill</h3>
<input type="number" id="fuelLiter" placeholder="Liter">
<input type="number" id="fuelPrice" placeholder="Price per Liter">
<button onclick="addFuel()">Save Refill</button>
<div id="fuelHistory"></div>
</div>
</div>

<!-- DAILY -->
<div id="daily" class="screen">
<div class="card">
<h3>Add KM</h3>
<input type="number" id="dailyKM" placeholder="KM Driven">
<button onclick="addKM()">Add KM</button>
</div>
</div>

<!-- ANALYTICS -->
<div id="analytics" class="screen">
<div class="card">
<canvas id="chart"></canvas>
</div>
</div>

</div>

<!-- NAV -->
<div class="navbar" id="navbar" style="display:none;">
<div onclick="switchTab('dashboard')" id="tab_dashboard" class="activeTab">Dashboard</div>
<div onclick="switchTab('fuel')" id="tab_fuel">Fuel</div>
<div onclick="switchTab('daily')" id="tab_daily">KM</div>
<div onclick="switchTab('analytics')" id="tab_analytics">Analytics</div>
</div>

<script>

let user;
let db;
let chartInstance;

function login(){
let id=loginId.value;
let pin=loginPin.value;
if(!id||!pin)return alert("Enter ID & PIN");

let users=JSON.parse(localStorage.getItem("cgn_users"))||{};

if(!users[id]){
users[id]={pin:pin,data:initData()};
}else{
if(users[id].pin!==pin)return alert("Wrong PIN");
}

localStorage.setItem("cgn_users",JSON.stringify(users));
user=id;
db=users[id].data;

loginScreen.style.display="none";
app.style.display="block";
navbar.style.display="flex";
render();
}

function initData(){
return{
tankCapacity:4,
mileage:25,
tankKM:0,
fuelHistory:[],
kmHistory:[]
}
}

function save(){
let users=JSON.parse(localStorage.getItem("cgn_users"));
users[user].data=db;
localStorage.setItem("cgn_users",JSON.stringify(users));
}

function addKM(){
let km=+dailyKM.value;
if(!km)return;
db.tankKM+=km;
db.kmHistory.push(km);
save();
render();
}

function addFuel(){
let liter=+fuelLiter.value;
let price=+fuelPrice.value;
if(!liter||!price)return;

let actualMileage=db.tankKM/liter;
if(actualMileage>0) db.mileage=actualMileage;

db.fuelHistory.push({
liter,price,
kmRun:db.tankKM,
mileage:actualMileage
});

db.tankKM=0;
save();
render();
}

function resetTank(){
db.tankKM=0;
save();
render();
}

function render(){

db.tankCapacity=+tankCapacity.value||db.tankCapacity;
let manual=+manualMileage.value;
if(manual>0) db.mileage=manual;

let fuelUsed=db.tankKM/db.mileage;
let fuelLeft=Math.max(db.tankCapacity-fuelUsed,0);
let kmRun=fuelLeft*db.mileage;

fuelLeftEl.innerText=fuelLeft.toFixed(2)+" L";
kmRunEl.innerText=kmRun.toFixed(0)+" KM";
tankKM.innerText=db.tankKM+" KM";
mileageDisplay.innerText=db.mileage.toFixed(1)+" KM/L";

fuelHistory.innerHTML="";
db.fuelHistory.forEach((f,i)=>{
fuelHistory.innerHTML+=`
<div style="margin-top:8px;">
${f.liter}L | KM:${f.kmRun} | ${f.mileage.toFixed(1)}KM/L
</div>`;
});

drawChart();
}

function drawChart(){
if(chartInstance)chartInstance.destroy();
chartInstance=new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:db.fuelHistory.map((_,i)=>"Tank "+(i+1)),
datasets:[{
label:"Mileage",
data:db.fuelHistory.map(f=>f.mileage),
borderColor:"#00ffaa",
backgroundColor:"rgba(0,255,170,0.1)"
}]
}
});
}

function switchTab(tab){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(tab).classList.add("active");

document.querySelectorAll(".navbar div").forEach(d=>d.classList.remove("activeTab"));
document.getElementById("tab_"+tab).classList.add("activeTab");
}

</script>
</body>
</html>
